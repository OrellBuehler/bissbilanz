repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: bunx prettier --write --ignore-unknown
        language: system
        types_or:
          - javascript
          - ts
          - svelte
          - css
          - json
          - yaml
          - markdown
          - html

      - id: svelte-check
        name: svelte-check
        entry: bash -c 'bun run paraglide:compile && bunx svelte-kit sync && bunx svelte-check --tsconfig ./tsconfig.json'
        language: system
        pass_filenames: false
        types_or:
          - ts
          - svelte

      - id: ktlint
        name: ktlint
        entry: bash -c 'source ~/.sdkman/bin/sdkman-init.sh 2>/dev/null; export ANDROID_HOME=${ANDROID_HOME:-~/android-sdk}; cd mobile && ./gradlew :shared:ktlintCheck :androidApp:ktlintCheck'
        language: system
        pass_filenames: false
        types:
          - kotlin

      - id: swiftformat
        name: swiftformat
        entry: bash -c 'command -v swiftformat >/dev/null 2>&1 && swiftformat --lint --config mobile/iosApp/.swiftformat || echo "swiftformat not installed, skipping"'
        language: system
        types:
          - swift
