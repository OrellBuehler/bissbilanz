<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Bissbilanz icon (glass apple)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>

    <radialGradient id="vig" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.25"/>
    </radialGradient>

    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <filter id="strokeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Apple body -->
    <path id="appleBody" d="
      M256 154
      C240 134 212 128 190 142
      C160 160 144 198 154 236
      C132 256 120 284 120 316
      C120 388 178 434 256 434
      C334 434 392 388 392 316
      C392 284 380 256 358 236
      C368 198 352 160 322 142
      C300 128 272 134 256 154
      Z
    "/>

    <clipPath id="clipApple">
      <use href="#appleBody"/>
    </clipPath>

    <linearGradient id="leafL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="leafR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>

    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#vig)"/>

  <!-- Glass apple -->
  <g clip-path="url(#clipApple)">
    <g filter="url(#glassBlur)">
      <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg)"/>
      <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#vig)"/>
    </g>

    <rect x="112" y="132" width="288" height="320" rx="128" fill="#FFFFFF" opacity="0.22"/>

    <path d="M162 238c24-62 82-96 150-92 18 1 34 4 48 10-70 6-126 46-154 120-10 26-38 18-44-38z"
          fill="#FFFFFF" opacity="0.18"/>
    <path d="M152 326c8 76 66 124 136 124 58 0 108-32 132-86-12 62-68 112-144 112-70 0-132-44-124-150z"
          fill="#FFFFFF" opacity="0.10"/>
  </g>

  <!-- Apple outline -->
  <use href="#appleBody" fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="10" filter="url(#strokeGlow)"/>

  <!-- Stem -->
  <path d="M252 144c0-24 10-44 30-58 10 12 16 28 16 44-14 16-30 26-46 28z"
        fill="url(#stem)"/>
  <path d="M252 144c0-24 10-44 30-58" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="6" stroke-linecap="round"/>

  <!-- Leaves -->
  <path d="M222 140c-30-22-70-18-92 10 30 22 70 22 102 2 6-4 4-10-10-12z"
        fill="url(#leafL)"/>
  <path d="M292 138c34-26 78-22 102 10-34 26-78 28-114 6-8-4-6-12 12-16z"
        fill="url(#leafR)"/>
  <path d="M170 152c26 16 58 18 84 8" fill="none" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="6" stroke-linecap="round"/>
  <path d="M342 154c-28 18-62 18-90 6" fill="none" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="6" stroke-linecap="round"/>

  <!-- SOLID centered scale -->
  <g stroke="#0B1220" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 226v144"/>
    <path d="M186 258h140"/>
    <path d="M206 258v62"/>
    <path d="M306 258v62"/>
  </g>

  <g fill="#0B1220">
    <path d="M166 328c10 18 28 28 40 28s30-10 40-28c-10-6-26-10-40-10s-30 4-40 10z"/>
    <path d="M266 328c10 18 28 28 40 28s30-10 40-28c-10-6-26-10-40-10s-30 4-40 10z"/>
  </g>

  <!-- Tile inner stroke -->
  <rect x="42" y="42" width="428" height="428" rx="104" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="6"/>
</svg>
