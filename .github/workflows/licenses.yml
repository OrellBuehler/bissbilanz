name: Update Third-Party Licenses

on:
  push:
    branches: [main]
    paths:
      - package.json
      - bun.lock
      - mobile/shared/build.gradle.kts
      - mobile/androidApp/build.gradle.kts
      - mobile/gradle/libs.versions.toml

permissions:
  contents: write

jobs:
  update-licenses:
    name: Regenerate Licenses
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate license report
        run: |
          bunx license-checker --production \
            --customPath <(echo '{"name":"","version":"","description":"","repository":"","publisher":"","email":"","url":"","licenses":"","licenseFile":"","licenseText":""}') \
            --json > /tmp/licenses.json

          node scripts/generate-licenses.mjs /tmp/licenses.json

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet THIRD_PARTY_LICENSES.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated licenses
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add THIRD_PARTY_LICENSES.md
          git commit -m "docs: update third-party licenses"
          git push
