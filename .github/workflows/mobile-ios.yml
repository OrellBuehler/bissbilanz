name: iOS Build & Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths: [mobile/**]

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.pull_request.draft == false
    runs-on: macos-14
    timeout-minutes: 45
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-ios-${{ runner.os }}-${{ hashFiles('mobile/**/*.gradle*', 'mobile/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-ios-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install --formula xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Build shared iOS framework
        run: ./gradlew shared:linkDebugFrameworkIosSimulatorArm64

      - name: Generate Xcode project
        working-directory: mobile/iosApp
        run: xcodegen generate

      - name: Build iOS app
        working-directory: mobile/iosApp
        run: |
          xcodebuild build \
            -project Bissbilanz.xcodeproj \
            -scheme Bissbilanz \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
