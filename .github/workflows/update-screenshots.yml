name: Update Screenshot Baselines

on:
  workflow_dispatch:

jobs:
  update-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: e2e_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Seed test database
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/e2e_test
        run: bun run test:seed

      - name: Build app
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/e2e_test
          SESSION_SECRET: ${{ secrets.E2E_SESSION_SECRET }}
          PUBLIC_APP_URL: http://localhost:4000
          INFOMANIAK_CLIENT_ID: fake
          INFOMANIAK_CLIENT_SECRET: fake
          INFOMANIAK_REDIRECT_URI: http://localhost:4000/oauth/callback
          TEST_MODE: 'true'
        run: bun run build

      - name: Update screenshot baselines
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/e2e_test
          SESSION_SECRET: ${{ secrets.E2E_SESSION_SECRET }}
          PUBLIC_APP_URL: http://localhost:4000
          INFOMANIAK_CLIENT_ID: fake
          INFOMANIAK_CLIENT_SECRET: fake
          INFOMANIAK_REDIRECT_URI: http://localhost:4000/oauth/callback
          CI: 'true'
        run: bunx playwright test --update-snapshots tests/e2e/screenshots.e2e.ts

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/screenshots/
          git diff --staged --quiet || git commit -m "test: update playwright screenshot baselines"
          git push
