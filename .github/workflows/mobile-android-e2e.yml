name: Android E2E Tests

on:
  push:
    branches: [main]
    paths: [mobile/**, src/**]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bissbilanz
          POSTGRES_PASSWORD: bissbilanz
          POSTGRES_DB: bissbilanz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://bissbilanz:bissbilanz@localhost:5432/bissbilanz_test
      TEST_MODE: 'true'
      TEST_USER_ID: '00000000-0000-0000-0000-000000000001'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-e2e-${{ runner.os }}-${{ hashFiles('mobile/**/*.gradle*', 'mobile/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-e2e-${{ runner.os }}-

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install backend dependencies
        run: bun install

      - name: Build backend
        run: bun run build
        env:
          PUBLIC_SENTRY_DSN: ''

      - name: Run migrations
        run: bun run db:migrate

      - name: Seed test data
        run: bun run test:seed

      - name: Start backend
        run: bun run start &
        env:
          PORT: '4000'
          ORIGIN: 'http://localhost:4000'

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Build test APKs
        working-directory: mobile
        run: ./gradlew androidApp:assembleDebug androidApp:assembleDebugAndroidTest

      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          emulator-boot-timeout: 600
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-save -noaudio
          working-directory: mobile
          script: ./gradlew androidApp:connectedDebugAndroidTest

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: mobile/androidApp/build/reports/androidTests/
          retention-days: 14
