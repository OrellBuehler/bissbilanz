name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

concurrency:
  group: mobile-release
  cancel-in-progress: false

jobs:
  android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ runner.os }}-${{ hashFiles('mobile/**/*.gradle*', 'mobile/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-android-${{ runner.os }}-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_FILE: keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew androidApp:assembleRelease -PSENTRY_DSN=${{ secrets.SENTRY_DSN }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/androidApp/build/outputs/apk/release/*.apk

  ios-release:
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-ios-${{ runner.os }}-${{ hashFiles('mobile/**/*.gradle*', 'mobile/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-ios-${{ runner.os }}-

      - name: Build shared iOS framework (release)
        run: ./gradlew shared:linkReleaseFrameworkIosArm64

      - name: Build iOS archive
        if: hashFiles('mobile/iosApp/iosApp.xcodeproj') != ''
        working-directory: mobile/iosApp
        run: |
          xcodebuild archive \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -archivePath iosApp.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS archive
        if: hashFiles('mobile/iosApp/iosApp.xcodeproj') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: mobile/iosApp/iosApp.xcarchive

  create-release:
    runs-on: ubuntu-latest
    needs: [android-release, ios-release]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ inputs.version }}
          name: Mobile v${{ inputs.version }}
          files: |
            artifacts/release-apk/*.apk
            artifacts/ios-archive/**
          draft: true
          generate_release_notes: true
