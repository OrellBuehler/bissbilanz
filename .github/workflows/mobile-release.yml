name: Mobile Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

concurrency:
  group: mobile-release
  cancel-in-progress: false

jobs:
  android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ runner.os }}-${{ hashFiles('mobile/**/*.gradle*', 'mobile/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-android-${{ runner.os }}-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/keystore.jks"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew androidApp:assembleRelease -PSENTRY_DSN=${{ secrets.SENTRY_DSN }}

      - name: Rename APK with version
        env:
          RELEASE_VERSION: ${{ inputs.version || github.event.release.tag_name }}
        run: |
          version="${RELEASE_VERSION#v}"
          mv androidApp/build/outputs/apk/release/*.apk "androidApp/build/outputs/apk/release/bissbilanz-${version}.apk"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/androidApp/build/outputs/apk/release/*.apk

      - name: Attach APK to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          cd androidApp/build/outputs/apk/release
          gh release upload "$RELEASE_TAG" *.apk --repo "${{ github.repository }}"
